# ============================================================
# Search Typeahead System — Application Configuration
# ============================================================

# ------ Application ------
spring.application.name=search-typeahead
server.port=8080

# ------ H2 Database (Default — Local Development) ------
# H2 in-memory database is used by default for zero-config local setup.
# Data is lost on restart; DatasetLoader repopulates on each boot.
spring.datasource.url=jdbc:h2:mem:typeahead;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------ PostgreSQL (Production — Uncomment to activate) ------
# spring.datasource.url=jdbc:postgresql://localhost:5432/typeahead
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres

# ------ JPA / Hibernate ------
# ddl-auto=update: Hibernate creates/updates schema from entity mappings.
# In production, use 'validate' with Flyway/Liquibase for migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Batch insert optimization: groups INSERTs into batches of 50
# Critical for DatasetLoader performance (100k+ records).
# Without batching: 100k individual INSERTs (~30s)
# With batching:    2k batch INSERTs (~3s)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ------ SQL Initialization ------
# Disabled: Hibernate handles schema via ddl-auto.
# schema.sql is kept as reference documentation.
spring.sql.init.mode=never

# ------ Logging ------
logging.level.com.typeahead=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{30} - %msg%n

# ------ Cache Configuration ------
# TTL: How long cache entries live before expiry (seconds)
# Tradeoff: Lower TTL = fresher data but more DB reads
#           Higher TTL = fewer DB reads but staler data
cache.ttl.seconds=60

# Number of logical cache nodes (simulates distributed cache cluster)
cache.nodes.count=4

# Virtual nodes per physical node for consistent hashing
# More virtual nodes = more uniform key distribution
# 150 virtual nodes with 4 physical nodes = 600 points on the ring
cache.virtual-nodes=150

# ------ Batch Writer Configuration ------
# Flush interval: How often the buffer is drained to DB (milliseconds)
batch.flush.interval-ms=5000

# Flush threshold: Buffer size that triggers immediate flush
batch.flush.threshold=100

# ------ Trending Configuration ------
# Decay interval: How often recent_count is halved (milliseconds)
# 3600000ms = 1 hour. Queries lose ~50% recency score each hour.
trending.decay.interval-ms=3600000

# Trending cache TTL: How long trending results are cached (seconds)
trending.cache.ttl-seconds=30

# Number of top trending queries to return
trending.top-count=20

# ------ CORS ------
cors.allowed-origins=http://localhost:3000
